<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New World — Territory Map</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1510; color: #d4c8a8; overflow: hidden; height: 100vh; width: 100vw; }
    #map { position: absolute; inset: 0; width: 100%; height: 100%; }

    .title-overlay {
      position: absolute; top: 16px; left: 16px; z-index: 10; pointer-events: none;
    }
    .title-overlay h1 {
      font-family: 'Cinzel', serif; font-size: clamp(16px, 3vw, 26px);
      color: #e8d5b0; text-shadow: 0 0 20px rgba(0,0,0,0.9), 0 2px 4px rgba(0,0,0,0.7);
      letter-spacing: 2px;
    }

    .controls {
      position: absolute; top: 16px; right: 16px; z-index: 10;
      display: flex; flex-direction: column; gap: 8px;
    }
    .controls button {
      font-family: 'Cinzel', serif; font-size: 13px;
      background: rgba(26,21,16,0.92); color: #d4c8a8;
      border: 1px solid #3a3528; border-radius: 6px;
      padding: 8px 14px; cursor: pointer; transition: all 0.2s;
    }
    .controls button:hover { background: rgba(50,40,28,0.95); border-color: #6a5f3e; }
    .controls button.active { background: rgba(80,60,20,0.9); border-color: #b09040; color: #f0e0a0; }

    .zoom-indicator {
      position: absolute; bottom: 40px; right: 16px; z-index: 10;
      background: rgba(26,21,16,0.9); border: 1px solid #3a3528;
      border-radius: 6px; padding: 6px 12px;
      font-family: 'Cinzel', serif; font-size: 12px; color: #b0a47e;
      pointer-events: none;
    }

    .tile-status {
      position: absolute; bottom: 70px; right: 16px; z-index: 10;
      background: rgba(26,21,16,0.9); border: 1px solid #3a3528;
      border-radius: 6px; padding: 6px 12px;
      font-family: 'Cinzel', serif; font-size: 11px; color: #7a9f6a;
      pointer-events: none; display: none;
    }
    .tile-status.warning { color: #dea06a; border-color: #5a4020; }
    .tile-status.visible { display: block; }

    /* Loading overlay */
    .loading-overlay {
      position: absolute; inset: 0; z-index: 100;
      background: #1a1510;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.6s ease;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid #3a3528; border-top-color: #b09040;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    .loading-text {
      font-family: 'Cinzel', serif; font-size: 14px; color: #b0a47e;
      margin-top: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .marker-wrap { cursor: pointer; text-align: center; line-height: 1; transition: transform 0.15s; }
    .marker-wrap:hover { transform: scale(1.2); }
    .marker-icon-major { font-size: 32px; filter: drop-shadow(0 0 6px rgba(200,170,80,0.7)); }
    .marker-icon-medium { font-size: 22px; filter: drop-shadow(0 0 4px rgba(160,140,80,0.5)); }
    .marker-icon-small { font-size: 16px; filter: drop-shadow(0 0 3px rgba(120,110,70,0.4)); }
    .marker-label {
      position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      white-space: nowrap; font-family: 'Cinzel', serif; font-size: 11px;
      color: #e8d5b0; text-shadow: 0 0 6px #000, 0 0 12px #000;
      pointer-events: none; margin-top: 2px;
    }

    .maplibregl-popup-content {
      background: rgba(26,21,16,0.96) !important;
      border: 1px solid #4a4230 !important; border-radius: 8px !important;
      color: #d4c8a8 !important; padding: 16px !important;
      max-width: 260px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    }
    .maplibregl-popup-close-button { color: #9a8c6e !important; font-size: 18px !important; }
    .popup-title { font-family: 'Cinzel', serif; font-size: 15px; color: #f0e0a0; margin-bottom: 6px; }
    .popup-desc { font-size: 13px; line-height: 1.5; color: #b0a47e; }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">Loading map tiles...</div>
</div>

<div class="title-overlay">
  <h1>⚔️ New World — Territory Map</h1>
</div>

<div class="controls">
  <button id="roadsBtn" onclick="toggleRoads()">🗺️ DM: Show Roads</button>
</div>

<div class="zoom-indicator" id="zoomEl">Zoom: 8.0</div>
<div class="tile-status" id="tileStatus"></div>

<script>
// ── PMTiles protocol ──
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol('pmtiles', protocol.tile);

// ── City data ──
const cities = [
  { name:"New Haven",      lng:-84.388, lat:33.749, size:"major",  icon:"🏰", desc:"The largest city in the Georgia territories. A hub of trade and political intrigue." },
  { name:"Silverbrook",    lng:-84.294, lat:34.075, size:"medium", icon:"🗼", desc:"A prosperous town known for its silver mines and skilled craftsmen." },
  { name:"Cumming",        lng:-84.100, lat:34.207, size:"medium", icon:"🗼", desc:"A frontier town at the edge of explored territory." },
  { name:"Brookhaven",     lng:-84.326, lat:33.865, size:"medium", icon:"🗼", desc:"A quiet suburb of New Haven, known for its gardens and scholars." },
  { name:"Buckhead",       lng:-84.387, lat:33.837, size:"medium", icon:"🗼", desc:"The noble district of New Haven, where the wealthy make their homes." },
  { name:"Helen's Hollow", lng:-83.727, lat:34.702, size:"small",  icon:"⛺", desc:"A remote mountain village, famous for its strange folk and stranger rumors." },
];

// ── Tile source detection & fallback ──
const TILE_SOURCES = {
  openfreemap: {
    name: 'OpenFreeMap',
    testUrl: 'https://tiles.openfreemap.org/planet',
    type: 'vector',
    source: {
      type: 'vector',
      url: 'https://tiles.openfreemap.org/planet'
    },
    // Source-layer names for OpenFreeMap (OpenMapTiles schema)
    layers: {
      water: 'water',
      waterway: 'waterway',
      landcover: 'landcover',
      park: 'park',
      transportation: 'transportation',
    }
  },
  demotiles: {
    name: 'MapLibre Demo Tiles',
    testUrl: 'https://demotiles.maplibre.org/tiles/tiles.json',
    type: 'vector',
    source: {
      type: 'vector',
      url: 'https://demotiles.maplibre.org/tiles/tiles.json'
    },
    // Demo tiles have different layer names
    layers: {
      water: 'countries',   // use countries polygon for land
      waterway: null,
      landcover: null,
      park: null,
      transportation: null,
    }
  },
  osm_raster: {
    name: 'OSM Raster (fallback)',
    testUrl: 'https://tile.openstreetmap.org/0/0/0.png',
    type: 'raster',
    source: {
      type: 'raster',
      tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
      tileSize: 256,
      attribution: '© OpenStreetMap contributors'
    },
    layers: {}
  }
};

async function testTileSource(source) {
  try {
    const resp = await fetch(source.testUrl, {
      method: 'GET',
      signal: AbortSignal.timeout(8000),
    });
    return resp.ok;
  } catch (e) {
    return false;
  }
}

function setLoadingText(text) {
  document.getElementById('loadingText').textContent = text;
}

function showTileStatus(msg, isWarning) {
  const el = document.getElementById('tileStatus');
  el.textContent = msg;
  el.classList.add('visible');
  if (isWarning) el.classList.add('warning');
}

function hideLoading() {
  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.add('hidden');
  // Remove from DOM after transition
  setTimeout(() => { overlay.style.display = 'none'; }, 700);
}

// ── Build fantasy style for a given tile source ──
function buildFantasyStyle(tileSource) {
  if (tileSource.type === 'raster') {
    // Raster fallback — simple dark overlay approach
    return {
      version: 8,
      sources: {
        'raster-tiles': tileSource.source
      },
      layers: [
        { id: 'background', type: 'background', paint: { 'background-color': '#1e1a14' } },
        {
          id: 'raster-layer',
          type: 'raster',
          source: 'raster-tiles',
          paint: {
            'raster-saturation': -0.8,
            'raster-brightness-max': 0.3,
            'raster-contrast': 0.3,
          }
        }
      ]
    };
  }

  // Vector tile style
  const sl = tileSource.layers;
  const layers = [
    // Background — dark parchment
    { id: 'background', type: 'background', paint: { 'background-color': '#1e1a14' } },
  ];

  // Land base — only if water layer exists
  if (sl.water) {
    layers.push({
      id: 'water', type: 'fill', source: 'ofm', 'source-layer': sl.water,
      paint: { 'fill-color': '#1a3848', 'fill-opacity': 1 }
    });
  }

  // Landcover layers — only if source has landcover
  if (sl.landcover) {
    layers.push(
      { id: 'landcover-grass', type: 'fill', source: 'ofm', 'source-layer': sl.landcover,
        filter: ['in', 'class', 'grass', 'meadow', 'farmland'],
        paint: { 'fill-color': '#1e2e18', 'fill-opacity': 0.6 } },
      { id: 'landcover-forest', type: 'fill', source: 'ofm', 'source-layer': sl.landcover,
        filter: ['in', 'class', 'wood', 'forest', 'scrub'],
        paint: { 'fill-color': '#162814', 'fill-opacity': 0.85 } },
      { id: 'landcover-wetland', type: 'fill', source: 'ofm', 'source-layer': sl.landcover,
        filter: ['in', 'class', 'wetland'],
        paint: { 'fill-color': '#1a2e30', 'fill-opacity': 0.7 } },
      { id: 'landcover-sand', type: 'fill', source: 'ofm', 'source-layer': sl.landcover,
        filter: ['in', 'class', 'sand'],
        paint: { 'fill-color': '#c8b89a', 'fill-opacity': 0.45 } },
      { id: 'landcover-ice', type: 'fill', source: 'ofm', 'source-layer': sl.landcover,
        filter: ['in', 'class', 'ice'],
        paint: { 'fill-color': '#3a4a5a', 'fill-opacity': 0.5 } },
    );
  }

  // Park / natural areas
  if (sl.park) {
    layers.push({
      id: 'park', type: 'fill', source: 'ofm', 'source-layer': sl.park,
      paint: { 'fill-color': '#1e3a1c', 'fill-opacity': 0.5 }
    });
  }

  // Waterway lines
  if (sl.waterway) {
    layers.push({
      id: 'waterway', type: 'line', source: 'ofm', 'source-layer': sl.waterway,
      paint: {
        'line-color': '#1e4458',
        'line-width': ['interpolate', ['linear'], ['zoom'], 4, 0.5, 10, 2, 14, 4],
        'line-opacity': 0.9
      }
    });
  }

  // DM road layers (hidden by default)
  if (sl.transportation) {
    layers.push(
      { id: 'dm-roads-casing', type: 'line', source: 'ofm', 'source-layer': sl.transportation,
        filter: ['in', 'class', 'motorway', 'trunk', 'primary'],
        layout: { 'visibility': 'none' },
        paint: {
          'line-color': '#3a2510',
          'line-width': ['interpolate', ['linear'], ['zoom'], 5, 2, 10, 5, 14, 10],
          'line-opacity': 0.8
        }
      },
      { id: 'dm-roads', type: 'line', source: 'ofm', 'source-layer': sl.transportation,
        filter: ['in', 'class', 'motorway', 'trunk', 'primary'],
        layout: { 'visibility': 'none', 'line-cap': 'round' },
        paint: {
          'line-color': '#6a4820',
          'line-width': ['interpolate', ['linear'], ['zoom'], 5, 1, 10, 3, 14, 6],
          'line-dasharray': [5, 3],
          'line-opacity': 0.7
        }
      },
    );
  }

  return {
    version: 8,
    glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
    sources: {
      'ofm': tileSource.source
    },
    layers
  };
}

// ── Init map with fallback logic ──
let map = null;
let activeTileSource = null;

async function initMap() {
  setLoadingText('Testing tile sources...');

  // Try sources in order of preference
  const sourceOrder = ['openfreemap', 'demotiles', 'osm_raster'];

  for (const key of sourceOrder) {
    const source = TILE_SOURCES[key];
    setLoadingText(`Testing ${source.name}...`);

    const available = await testTileSource(source);
    if (available) {
      activeTileSource = source;
      console.log(`✅ Using tile source: ${source.name}`);
      break;
    } else {
      console.warn(`❌ ${source.name} unavailable, trying next...`);
    }
  }

  if (!activeTileSource) {
    setLoadingText('All tile sources failed. Map cannot load.');
    showTileStatus('⚠️ All tile sources unreachable', true);
    return;
  }

  if (activeTileSource.name !== 'OpenFreeMap') {
    showTileStatus(`⚠️ Using fallback: ${activeTileSource.name}`, true);
  }

  setLoadingText(`Loading map from ${activeTileSource.name}...`);

  const style = buildFantasyStyle(activeTileSource);

  map = new maplibregl.Map({
    container: 'map',
    style: style,
    center: [-84.2, 34.0],
    zoom: 8,
    minZoom: 3,
    maxZoom: 16,
  });

  map.addControl(new maplibregl.NavigationControl(), 'bottom-left');

  map.on('load', () => {
    console.log('Map loaded successfully');
    hideLoading();
    addMarkers(); // create once
  });

  map.on('error', (e) => {
    console.error('Map error:', e.error?.message || e);
  });

  // Update visibility on zoom — don't recreate markers, just show/hide
  map.on('zoom', () => {
    document.getElementById('zoomEl').textContent = `Zoom: ${map.getZoom().toFixed(1)}`;
    updateMarkerVisibility();
  });

  // Safety timeout
  setTimeout(() => {
    hideLoading();
    if (markers.length === 0) addMarkers();
  }, 15000);
}

// ── Markers — created ONCE, visibility toggled via CSS ──
let markers = [];

function addMarkers() {
  if (!map) return;
  // Clear any existing markers first
  markers.forEach(m => m.remove());
  markers = [];

  // Create ALL markers upfront — fixed to their coordinates permanently
  cities.forEach(city => {
    const el = document.createElement('div');
    el.className = 'marker-wrap';
    el.dataset.size = city.size;
    el.innerHTML = `<div class="marker-icon-${city.size}">${city.icon}</div><div class="marker-label">${city.name}</div>`;

    const popup = new maplibregl.Popup({ offset: 25, maxWidth: '260px' })
      .setHTML(`<div class="popup-title">${city.icon} ${city.name}</div><div class="popup-desc">${city.desc}</div>`);

    const marker = new maplibregl.Marker({ element: el, anchor: 'bottom' })
      .setLngLat([city.lng, city.lat])
      .setPopup(popup)
      .addTo(map);

    markers.push(marker);
  });

  // Set initial visibility
  updateMarkerVisibility();
}

function updateMarkerVisibility() {
  if (!map) return;
  const zoom = map.getZoom();
  markers.forEach((marker, i) => {
    const city = cities[i];
    const show = (city.size === 'major' && zoom >= 5) ||
                 (city.size === 'medium' && zoom >= 7) ||
                 (city.size === 'small' && zoom >= 9);
    marker.getElement().style.display = show ? 'block' : 'none';
  });
}

// ── Road toggle ──
let roadsOn = false;
function toggleRoads() {
  if (!map) return;
  // Only works with vector tile source that has transportation layer
  if (!activeTileSource || !activeTileSource.layers.transportation) {
    alert('Road layer not available with current tile source.');
    return;
  }

  roadsOn = !roadsOn;
  const v = roadsOn ? 'visible' : 'none';
  try {
    map.setLayoutProperty('dm-roads', 'visibility', v);
    map.setLayoutProperty('dm-roads-casing', 'visibility', v);
  } catch (e) {
    console.warn('Could not toggle road layers:', e.message);
  }
  document.getElementById('roadsBtn').classList.toggle('active', roadsOn);
  document.getElementById('roadsBtn').textContent = roadsOn ? '🗺️ DM: Hide Roads' : '🗺️ DM: Show Roads';
}

document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') toggleRoads();
});

// ── Start ──
initMap();
</script>
</body>
</html>
