<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New World — Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #0d1b2a 0%, #080d14 60%, #020508 100%);
      color: #c9b89e;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, #0d1b2a44 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, #2a1f1422 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, #0a1520 44 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 420px;
    }

    .card {
      background: rgba(10, 20, 35, 0.85);
      border: 1px solid #3a2f24;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 8px 32px #00000066, 0 0 80px #d4a85308;
    }

    .emblem {
      font-size: 2.5rem;
      margin-bottom: .75rem;
      display: block;
    }

    h1 {
      font-size: 1.5rem;
      color: #e8d5b7;
      font-weight: 700;
      letter-spacing: .02em;
      margin-bottom: .25rem;
    }

    .subtitle {
      color: #8a7a6a;
      font-size: .9rem;
      margin-bottom: 2rem;
    }

    /* Alert banner for session expired / auth failed */
    .alert {
      display: none;
      background: #4a2a1a;
      border: 1px solid #6a3a2a;
      border-radius: 8px;
      padding: .75rem 1rem;
      margin-bottom: 1.25rem;
      font-size: .85rem;
      color: #e8a87e;
    }
    .alert.visible { display: block; }

    /* Auth buttons */
    .auth-buttons {
      display: flex;
      flex-direction: column;
      gap: .75rem;
      margin-bottom: 1.75rem;
    }

    .auth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      padding: .85rem 1.25rem;
      border-radius: 10px;
      border: 1px solid;
      font-size: .95rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: all .2s ease;
      position: relative;
    }

    .auth-btn .icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .auth-btn .icon svg {
      width: 20px;
      height: 20px;
    }

    /* Google */
    .auth-btn.google {
      background: #1a2332;
      border-color: #2a4060;
      color: #8ab4f8;
    }
    .auth-btn.google:hover {
      background: #223050;
      border-color: #4285f4;
      box-shadow: 0 0 20px #4285f418;
    }

    /* GitHub */
    .auth-btn.github {
      background: #161b22;
      border-color: #30363d;
      color: #c9d1d9;
    }
    .auth-btn.github:hover {
      background: #1f2937;
      border-color: #484f58;
      box-shadow: 0 0 20px #c9d1d908;
    }

    /* Apple */
    .auth-btn.apple {
      background: #1c1c1e;
      border-color: #3a3a3c;
      color: #f5f5f7;
    }
    .auth-btn.apple:hover {
      background: #2c2c2e;
      border-color: #545456;
      box-shadow: 0 0 20px #f5f5f708;
    }

    /* Remember me */
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      margin-bottom: 1.5rem;
      font-size: .85rem;
      color: #8a7a6a;
    }

    .remember-row input[type="checkbox"] {
      accent-color: #d4a853;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .remember-row label {
      cursor: pointer;
    }

    .divider {
      height: 1px;
      background: #2a2218;
      margin: 0 0 1.25rem;
    }

    .privacy-note {
      font-size: .78rem;
      color: #6a5f52;
      line-height: 1.5;
    }

    /* Logged-in state */
    .logged-in {
      display: none;
    }

    .logged-in.visible {
      display: block;
    }

    .logged-in-card {
      text-align: center;
    }

    .logged-in-card .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid #d4a853;
      margin: 0 auto .75rem;
      display: block;
      object-fit: cover;
    }

    .logged-in-card .welcome {
      color: #e8d5b7;
      font-size: 1.1rem;
      margin-bottom: .25rem;
    }

    .logged-in-card .email {
      color: #8a7a6a;
      font-size: .85rem;
      margin-bottom: 1.25rem;
    }

    .logged-in-card .actions {
      display: flex;
      gap: .75rem;
      justify-content: center;
    }

    .btn {
      padding: .6rem 1.5rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 500;
      text-decoration: none;
      transition: all .2s;
    }

    .btn-primary {
      background: #2a3a2a;
      color: #7ec87e;
      border: 1px solid #3a5a3a;
    }
    .btn-primary:hover { background: #3a4a3a; }

    .btn-secondary {
      background: #2a2218;
      color: #c9b89e;
      border: 1px solid #3a2f24;
    }
    .btn-secondary:hover { background: #3a3020; }

    .auth-buttons-section.hidden { display: none; }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <img src="/logo.png" alt="Cartyx" style="width:100px;height:100px;border-radius:50%;object-fit:cover;box-shadow:0 0 30px rgba(100,180,200,0.3);margin-bottom:8px">
      <h1>New World</h1>
      <p class="subtitle">Choose your realm to enter</p>

      <!-- Alert for session expired / auth failed -->
      <div class="alert" id="alert"></div>

      <!-- Logged-in state -->
      <div class="logged-in" id="loggedIn">
        <div class="logged-in-card">
          <img src="" alt="" class="avatar" id="userAvatar" style="display:none">
          <p class="welcome" id="welcomeMsg">Welcome back!</p>
          <p class="email" id="userEmail"></p>
          <div class="actions">
            <a href="/dashboard" class="btn btn-primary">⚔️ Go to Dashboard</a>
            <a href="/logout" class="btn btn-secondary">🚪 Sign Out</a>
          </div>
        </div>
      </div>

      <!-- Sign-in buttons -->
      <div class="auth-buttons-section" id="authSection">
        <div class="auth-buttons">
          <!-- Google -->
          <a class="auth-btn google" id="btnGoogle" href="/auth/google">
            <span class="icon">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
            </span>
            Continue with Google
          </a>

          <!-- GitHub -->
          <a class="auth-btn github" id="btnGitHub" href="/auth/github">
            <span class="icon">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
              </svg>
            </span>
            Continue with GitHub
          </a>

          <!-- Apple -->
          <a class="auth-btn apple" id="btnApple" href="/auth/apple">
            <span class="icon">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
              </svg>
            </span>
            Continue with Apple
          </a>
        </div>

        <div class="remember-row">
          <input type="checkbox" id="rememberMe">
          <label for="rememberMe">Remember me for 30 days</label>
        </div>

        <div class="divider"></div>

        <p class="privacy-note">
          🔒 Your identity is used only to access campaign data.<br>
          We don't post anything on your behalf.
        </p>
      </div>
    </div>
  </div>

  <script>
    // Check for alert reasons in URL
    const params = new URLSearchParams(window.location.search);
    const reason = params.get('reason');
    const alertEl = document.getElementById('alert');

    if (reason === 'session_expired') {
      alertEl.textContent = '⏰ Your session expired. Please sign in again.';
      alertEl.classList.add('visible');
    } else if (reason === 'auth_failed') {
      alertEl.textContent = '❌ Authentication failed. Please try again.';
      alertEl.classList.add('visible');
    }

    // Remember-me: append query param to auth links
    const rememberCheckbox = document.getElementById('rememberMe');
    const authLinks = document.querySelectorAll('.auth-btn');

    authLinks.forEach(link => {
      const baseHref = link.getAttribute('href');
      link.addEventListener('click', (e) => {
        if (rememberCheckbox.checked) {
          e.preventDefault();
          window.location.href = baseHref + '?remember=true';
        }
      });
    });

    // Check if already logged in
    fetch('/api/me')
      .then(res => {
        if (!res.ok) return null;
        return res.json();
      })
      .then(user => {
        if (user && user.id) {
          document.getElementById('loggedIn').classList.add('visible');
          document.getElementById('authSection').classList.add('hidden');
          document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.name}!`;
          document.getElementById('userEmail').textContent = user.email || '';
          if (user.avatar) {
            const avatarEl = document.getElementById('userAvatar');
            avatarEl.src = user.avatar;
            avatarEl.style.display = 'block';
          }
        }
      })
      .catch(() => {
        // Not logged in — show sign-in buttons (default)
      });
  </script>
</body>
</html>
